version: '3.8'

services:
  sentryvision:
    build:
      context: .
      dockerfile: Dockerfile.monolithic
    container_name: sentryvision
    ports:
      - "80:80"      # Frontend (nginx)
      - "9753:9753"   # Backend API
      - "5432:5432"   # PostgreSQL
    volumes:
      - ./data:/app/data                    # Persistent data
      - ./server/cameras.json:/app/server/cameras.json  # Camera config
      - postgres_data:/var/lib/postgresql/data  # Database data
    environment:
      - NODE_ENV=production
      - PORT=9753
      - DB_HOST=localhost
      - DB_PORT=5432
      - DB_NAME=sentryvision
      - DB_USER=sentryvision
      - DB_PASSWORD=sentryvision123
      - JWT_ACCESS_SECRET=your-jwt-access-secret-here
      - JWT_REFRESH_SECRET=your-jwt-refresh-secret-here
    restart: unless-stopped

volumes:
  postgres_data: