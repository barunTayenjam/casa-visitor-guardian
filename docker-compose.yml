services:
  # PostgreSQL Database
  postgres:
    build:
      context: ./database
      dockerfile: Dockerfile
    container_name: sentryvision-postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    environment:
      - POSTGRES_DB=sentryvision
      - POSTGRES_USER=sentryvision
      - POSTGRES_PASSWORD=sentryvision123
      - TZ=Asia/Kolkata
    command: >
      postgres
      -c shared_buffers=${POSTGRES_SHARED_BUFFERS:-64MB}
      -c max_connections=${POSTGRES_MAX_CONNECTIONS:-20}
      -c work_mem=4MB
      -c maintenance_work_mem=32MB
      -c effective_cache_size=128MB
      -c huge_pages=off
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentryvision -d sentryvision"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sentryvision_network
    deploy:
      resources:
        limits:
          cpus: ${POSTGRES_CPU_LIMIT:-0.25}
          memory: ${POSTGRES_MEM_LIMIT:-384M}
        reservations:
          cpus: ${POSTGRES_CPU_RESERVE:-0.1}
          memory: ${POSTGRES_MEM_RESERVE:-192M}

  # Backend API Server (Development Mode)
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: sentryvision-backend
    ports:
      - "0.0.0.0:9753:9753"
    environment:
      - NODE_ENV=development
      - PORT=9753
      - DB_HOST=postgres
      - TZ=Asia/Kolkata
      - DB_PORT=5432
      - DB_NAME=sentryvision
      - DB_USER=sentryvision
      - DB_PASSWORD=sentryvision123
      - JWT_ACCESS_SECRET=dev-jwt-access-secret-change-in-production
      - JWT_REFRESH_SECRET=dev-jwt-refresh-secret-change-in-production
      - CREDENTIAL_ENCRYPTION_KEY=dev-credential-encryption-key-32bytes-min
      - DATABASE_URL=postgresql://sentryvision:sentryvision123@postgres:5432/sentryvision
      - OPENCV_SERVICE_URL=http://opencv:8084
      - DETECTIONS_DIR=/app/data/detections
      # Resource optimization settings (for 1 core, 2GB RAM systems)
      - LOW_RESOURCE_MODE=${LOW_RESOURCE_MODE:-false}
      - FFMPEG_THREADS=${FFMPEG_THREADS:-2}
      - DEFAULT_FPS=${DEFAULT_FPS:-2}
      - DEFAULT_RESOLUTION=${DEFAULT_RESOLUTION:-640x360}
      - STREAM_INACTIVITY_TIMEOUT=${STREAM_INACTIVITY_TIMEOUT:-300000}
      # Node.js memory optimization
      - NODE_OPTIONS=--max-old-space-size=${NODE_MAX_MEMORY:-384}
    volumes:
      - ./server:/app
      - ./server/node_modules:/app/node_modules
      - ./data/detections:/app/data/detections
      - ./data/events:/app/data/events
      - ./data/snapshots:/app/data/snapshots
      - ./public/events:/app/public/events
    working_dir: /app
    command: ["npx", "tsx", "watch", "src/index.ts"]
    cap_add:
      - NET_RAW
    depends_on:
      postgres:
        condition: service_healthy
      opencv:
        condition: service_started
    restart: always
    networks:
      - sentryvision_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9753/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: ${BACKEND_CPU_LIMIT:-1.0}
          memory: ${BACKEND_MEM_LIMIT:-1024M}
        reservations:
          cpus: ${BACKEND_CPU_RESERVE:-0.5}
          memory: ${BACKEND_MEM_RESERVE:-512M}

  # Frontend Development Server
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sentryvision-frontend
    ports:
      - "0.0.0.0:5173:5173"
    environment:
      - NODE_ENV=development
      - VITE_BACKEND_URL=http://sentryvision-backend:9753
      - TZ=Asia/Kolkata
    volumes:
      - ./frontend:/app
      - ./frontend/node_modules:/app/node_modules
    working_dir: /app
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]
    depends_on:
      backend:
        condition: service_healthy
    restart: always
    networks:
      - sentryvision_network

  # Redis (for caching and sessions)
  redis:
    image: "redis:7-alpine"
    container_name: sentryvision-redis
    ports:
      - "6379:6379"
    environment:
      - TZ=Asia/Kolkata
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --maxmemory ${REDIS_MAX_MEMORY:-50mb}
      --maxmemory-policy allkeys-lru
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sentryvision_network
    deploy:
      resources:
        limits:
          cpus: ${REDIS_CPU_LIMIT:-0.1}
          memory: ${REDIS_MEM_LIMIT:-64M}
        reservations:
          cpus: ${REDIS_CPU_RESERVE:-0.05}
          memory: ${REDIS_MEM_RESERVE:-32M}

  # OpenCV Python Detection Service (Development Mode)
  opencv:
    build:
      context: ./opencv-service
      dockerfile: Dockerfile
    container_name: sentryvision-opencv
    ports:
      - "0.0.0.0:8084:8084"
    environment:
      - PORT=8084
      - FLASK_ENV=development
      - TZ=Asia/Kolkata
      - FLASK_DEBUG=1
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=sentryvision
      - POSTGRES_USER=sentryvision
      - POSTGRES_PASSWORD=sentryvision123
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DETECTIONS_DIR=/app/data/detections
    volumes:
      - ./opencv-service:/app
      - ./opencv-service/node_modules:/app/node_modules
      - ./opencv-service/models:/app/models
      - ./opencv-service/data:/app/data
      - ./opencv-service/known_faces:/app/known_faces
      - ./data/detections:/app/data/detections
      - ./data/events:/app/data/events
      - ./data/snapshots:/app/data/snapshots
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    networks:
      - sentryvision_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8084/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: ${OPENCV_CPU_LIMIT:-0.5}
          memory: ${OPENCV_MEM_LIMIT:-512M}
        reservations:
          cpus: ${OPENCV_CPU_RESERVE:-0.25}
          memory: ${OPENCV_MEM_RESERVE:-256M}

networks:
  sentryvision_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data: