services:
  # PostgreSQL Database
  postgres:
    build:
      context: ./database
      dockerfile: Dockerfile
    container_name: sentryvision-postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    environment:
      - POSTGRES_DB=sentryvision
      - POSTGRES_USER=sentryvision
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - TZ=Asia/Kolkata
    command: >
      postgres
      -c shared_buffers=${POSTGRES_SHARED_BUFFERS:-64MB}
      -c max_connections=${POSTGRES_MAX_CONNECTIONS:-20}
      -c work_mem=4MB
      -c maintenance_work_mem=32MB
      -c effective_cache_size=128MB
      -c huge_pages=off
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c default_statistics_target=50
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentryvision -d sentryvision"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sentryvision_network
    deploy:
      resources:
        limits:
          cpus: ${POSTGRES_CPU_LIMIT:-0.5}
          memory: ${POSTGRES_MEM_LIMIT:-256M}
        reservations:
          cpus: ${POSTGRES_CPU_RESERVE:-0.1}
          memory: ${POSTGRES_MEM_RESERVE:-128M}

  # Backend API Server (production mode, serves frontend static files)
  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: sentryvision-backend
    ports:
      - "0.0.0.0:9753:9753"
    environment:
      - NODE_ENV=production
      - PORT=9753
      - DB_HOST=postgres
      - TZ=Asia/Kolkata
      - DB_PORT=5432
      - DB_NAME=sentryvision
      - DB_USER=sentryvision
      - DB_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET:-dev-jwt-access-secret-change-me}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-dev-jwt-refresh-secret-change-me}
      - CREDENTIAL_ENCRYPTION_KEY=${CREDENTIAL_ENCRYPTION_KEY:-dev-credential-encryption-key-change}
      - OPENCV_SERVICE_URL=http://opencv:8084
      - DETECTIONS_DIR=/app/data/detections
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - LOW_RESOURCE_MODE=${LOW_RESOURCE_MODE:-true}
      - FFMPEG_THREADS=${FFMPEG_THREADS:-2}
      - DEFAULT_FPS=${DEFAULT_FPS:-2}
      - DEFAULT_RESOLUTION=${DEFAULT_RESOLUTION:-640x360}
      - STREAM_INACTIVITY_TIMEOUT=${STREAM_INACTIVITY_TIMEOUT:-300000}
      - PIPELINE_MODE=${PIPELINE_MODE:-python-only}
      - PYTHON_WS_URL=ws://opencv:9090
      - REDIS_DISABLED=true
      - CORS_ORIGIN=${CORS_ORIGIN:-https://argus.tayenjam.qzz.io}
      - SEED_ADMIN_PASSWORD=${SEED_ADMIN_PASSWORD:-admin123}
      - SEED_USER_PASSWORD=${SEED_USER_PASSWORD:-user123}
    volumes:
      - ./data/detections:/app/data/detections
      - ./data/events:/app/data/events
      - ./data/snapshots:/app/data/snapshots
      - ./public/events:/app/public/events
    depends_on:
      postgres:
        condition: service_healthy
      opencv:
        condition: service_started
    restart: always
    networks:
      - sentryvision_network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9753/health/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: ${BACKEND_CPU_LIMIT:-1.0}
          memory: ${BACKEND_MEM_LIMIT:-512M}
        reservations:
          cpus: ${BACKEND_CPU_RESERVE:-0.25}
          memory: ${BACKEND_MEM_RESERVE:-256M}

  # OpenCV Python Detection Service
  opencv:
    build:
      context: ./opencv-service
      dockerfile: Dockerfile
    container_name: sentryvision-opencv
    ports:
      - "0.0.0.0:8084:8084"
      - "0.0.0.0:9090:9090"
    environment:
      - PORT=8084
      - FLASK_ENV=production
      - TZ=Asia/Kolkata
      - FLASK_DEBUG=0
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=sentryvision
      - POSTGRES_USER=sentryvision
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - DETECTIONS_DIR=/app/data/detections
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - ./opencv-service/models:/app/models
      - ./opencv-service/data:/app/data
      - ./opencv-service/known_faces:/app/known_faces
      - ./data/detections:/app/data/detections
      - ./data/events:/app/data/events
      - ./data/snapshots:/app/data/snapshots
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    networks:
      - sentryvision_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8084/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: ${OPENCV_CPU_LIMIT:-2.0}
          memory: ${OPENCV_MEM_LIMIT:-2048M}
        reservations:
          cpus: ${OPENCV_CPU_RESERVE:-0.5}
          memory: ${OPENCV_MEM_RESERVE:-256M}

  # go2rtc — RTSP to WebRTC bridge
  go2rtc:
    image: alexxit/go2rtc:1.9.14
    container_name: sentryvision-go2rtc
    ports:
      - "0.0.0.0:1984:1984"
      - "0.0.0.0:8555:8555/tcp"
      - "0.0.0.0:8555:8555/udp"
    volumes:
      - ./go2rtc.yaml:/config/go2rtc.yaml
      - ./go2rtc-entrypoint.sh:/entrypoint.sh
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    environment:
      - TZ=Asia/Kolkata
    restart: always
    networks:
      - sentryvision_network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

networks:
  sentryvision_network:
    driver: bridge

volumes:
  postgres_data:
