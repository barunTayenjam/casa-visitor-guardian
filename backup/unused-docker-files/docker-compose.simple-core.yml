services:
  sentryvision:
    build:
      context: .
      dockerfile: Dockerfile.simple-core
    ports:
      - "5173:5173"  # Frontend
      - "9753:9753"  # Backend API
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9753/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s