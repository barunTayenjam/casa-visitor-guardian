<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home Security - Test</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #1a1a1a;
            color: white;
            font-family: Arial, sans-serif;
        }
        .status {
            padding: 10px;
            margin: 5px 0;
            background: #333;
            border-radius: 5px;
        }
        .error { background: #8b0000; }
        .success { background: #006400; }
    </style>
</head>
<body>
    <h1>Home Security - Debug Mode</h1>
    <div id="status"></div>
    <div id="root">
        <div class="status">Loading application...</div>
    </div>

    <script>
        const status = document.getElementById('status');
        
        function addStatus(message, isError = false) {
            const div = document.createElement('div');
            div.className = `status ${isError ? 'error' : 'success'}`;
            div.textContent = message;
            status.appendChild(div);
            console.log(message);
        }
        
        addStatus('Starting debug test...');
        
        // Test 1: Check if basic React works
        try {
            import('/src/main.tsx').then(() => {
                addStatus('Main module loaded successfully');
                setTimeout(() => {
                    addStatus('If you see this, the app loaded. Check the content above.');
                }, 2000);
            }).catch(error => {
                addStatus(`Module loading failed: ${error.message}`, true);
                console.error('Full error:', error);
            });
        } catch (error) {
            addStatus(`Import failed: ${error.message}`, true);
        }
    </script>
</body>
</html>
