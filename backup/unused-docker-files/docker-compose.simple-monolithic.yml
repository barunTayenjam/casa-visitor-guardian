version: '3.8'

services:
  sentryvision:
    build:
      context: .
      dockerfile: Dockerfile.simple-monolithic
    ports:
      - "9753:9753"
    environment:
      - NODE_ENV=production
      - PORT=9753
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9753/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s