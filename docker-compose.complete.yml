services:
  sentryvision:
    build:
      context: .
      dockerfile: Dockerfile.complete
    ports:
      - "5173:5173"  # Frontend - accessible from any IP
      - "9753:9753"  # Backend API - accessible from any IP
      - "8080:8080"  # OpenCV Service - accessible from any IP
    environment:
      - NODE_ENV=production
    restart: unless-stopped