services:
  frontend:
    image: localhost/sentryvision-frontend:test
    ports:
      - "3020:80"
    environment:
      - NODE_ENV=production
      - NGINX_PORT=80
    volumes:
      - ./nginx-standalone.conf:/etc/nginx/conf.d/default.conf.template
    restart: unless-stopped
    
  backend:
    image: localhost/sentryvision-backend:simple
    ports:
      - "9753:9753"
    environment:
      - NODE_ENV=production
      - PORT=9753
    restart: unless-stopped