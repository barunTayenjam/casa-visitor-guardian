<!DOCTYPE html>
<html>
<head>
    <title>Stream Test</title>
</head>
<body>
    <h1>Camera Stream Test</h1>
    <div>
        <button onclick="startStream('cam1')">Start Cam1 Stream</button>
        <button onclick="startStream('cam2')">Start Cam2 Stream</button>
        <button onclick="stopStream('cam1')">Stop Cam1 Stream</button>
        <button onclick="stopStream('cam2')">Stop Cam2 Stream</button>
    </div>
    <div>
        <h3>Cam1 Stream:</h3>
        <img id="cam1" src="" width="320" height="240" />
        <h3>Cam2 Stream:</h3>
        <img id="cam2" src="" width="320" height="240" />
    </div>
    <div>
        <h3>Log:</h3>
        <pre id="log"></pre>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const log = document.getElementById('log');
        
        function logMessage(msg) {
            console.log(msg);
            log.textContent += new Date().toISOString() + ' - ' + msg + '\n';
        }

        socket.on('connect', () => {
            logMessage('Connected to server');
        });

        socket.on('frame', (data) => {
            logMessage(`Frame received for ${data.cameraId}, size: ${data.data?.length || 0}`);
            const img = document.getElementById(data.cameraId);
            if (img && data.data) {
                img.src = 'data:image/jpeg;base64,' + data.data;
            }
        });

        socket.on('streamRequested', (data) => {
            logMessage(`Stream requested: ${JSON.stringify(data)}`);
        });

        socket.on('streamError', (data) => {
            logMessage(`Stream error: ${JSON.stringify(data)}`);
        });

        function startStream(cameraId) {
            logMessage(`Requesting stream for ${cameraId}`);
            socket.emit('requestStream', cameraId);
        }

        function stopStream(cameraId) {
            logMessage(`Stopping stream for ${cameraId}`);
            socket.emit('stopStream', cameraId);
        }
    </script>
</body>
</html>
