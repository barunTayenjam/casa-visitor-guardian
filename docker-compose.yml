version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    build:
      context: ./database
      dockerfile: Dockerfile
    container_name: sentryvision-postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    environment:
      - POSTGRES_DB=sentryvision
      - POSTGRES_USER=sentryvision
      - POSTGRES_PASSWORD=sentryvision123
    restart: always

  # Backend API Server
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: sentryvision-backend
    ports:
      - "8082:8082"
    environment:
      - NODE_ENV=development
      - PORT=8082
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=sentryvision
      - DB_USER=sentryvision
      - DB_PASSWORD=sentryvision123
      - JWT_ACCESS_SECRET=dev-jwt-access-secret
      - JWT_REFRESH_SECRET=dev-jwt-refresh-secret
      - DATABASE_URL=postgresql://sentryvision:sentryvision123@postgres:5432/sentryvision
      - OPENCV_SERVICE_URL=http://opencv:8084
      - DETECTIONS_DIR=/app/data/detections
    volumes:
      - ./server:/app
      - ./server/node_modules:/app/node_modules
      - ./data/detections:/app/data/detections
      - ./data/events:/app/data/events
      - ./data/snapshots:/app/data/snapshots
      - ./public/events:/app/public/events
    working_dir: /app
    command: ["npx", "tsx", "src/index.ts"]
    depends_on:
      - postgres
      - opencv
    restart: always

  # Frontend Development Server
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sentryvision-frontend
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://backend:8082
    volumes:
      - ./frontend:/app
      - ./frontend/node_modules:/app/node_modules
    working_dir: /app
    command: ["npm", "run", "dev"]
    depends_on:
      - backend
    restart: always

  # Redis (for caching and sessions)
  redis:
    image: "redis:7-alpine"
    container_name: sentryvision-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  # OpenCV Python Detection Service
  opencv:
    build:
      context: ./opencv-service
      dockerfile: Dockerfile
    container_name: sentryvision-opencv
    ports:
      - "8084:8084"
    environment:
      - PORT=8084
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=sentryvision
      - POSTGRES_USER=sentryvision
      - POSTGRES_PASSWORD=sentryvision123
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./opencv-service:/app
      - ./opencv-service/node_modules:/app/node_modules
      - ./opencv-service/models:/app/models
      - ./opencv-service/data:/app/data
      - ./opencv-service/known_faces:/app/known_faces
    depends_on:
      - postgres
      - redis
    restart: always

volumes:
  postgres_data:
  redis_data: