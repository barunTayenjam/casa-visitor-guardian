services:
  nginx:
    build:
      context: .
      dockerfile: Containerfile
    container_name: sentryvision_nginx
    ports:
      - "4000:3000"
    environment:
      - NGINX_PORT=3000
    depends_on:
      - backend
    networks:
      - sentryvision-net
    restart: unless-stopped

  backend:
    build:
      context: ./server
      dockerfile: Containerfile
    container_name: sentryvision_backend
    env_file:
      - .env
    volumes:
      - ./data/snapshots:/app/public/snapshots
      - ./data/events:/app/public/events
      - ./cameras.json:/app/cameras.json
    networks:
      - sentryvision-net
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  opencv:
    build:
      context: ./opencv-service
      dockerfile: Dockerfile
    container_name: sentryvision_opencv
    env_file:
      - .env
    volumes:
      - ./data/snapshots:/app/snapshots
      - ./data/events:/app/events
    networks:
      - sentryvision-net
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: sentryvision_postgres
    env_file:
      - .env
    volumes:
      - sentryvision_pg_data:/var/lib/postgresql/data
    networks:
      - sentryvision-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: sentryvision_redis
    volumes:
      - sentryvision_redis_data:/data
    networks:
      - sentryvision-net
    restart: unless-stopped

volumes:
  sentryvision_pg_data:
  sentryvision_redis_data:

networks:
  sentryvision-net:
    driver: bridge