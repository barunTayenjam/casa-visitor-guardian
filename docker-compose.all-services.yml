version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: sentryvision-postgres
    environment:
      - POSTGRES_DB=${DB_NAME:-sentryvision}
      - POSTGRES_USER=${DB_USER:-sentryvision}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
      - ./database/migrations:/docker-entrypoint-initdb.d/migrations:ro
      - ./logs/postgres:/var/log/postgresql
    ports:
      - "${DB_PORT:-5432}:5432"
    restart: unless-stopped
    networks:
      - sentryvision-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-sentryvision} -d ${DB_NAME:-sentryvision}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: >
      postgres
      -c shared_preload_libraries=pg_stat_statements
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c work_mem=4MB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c log_statement=none
      -c log_duration=on
      -c log_min_duration_statement=1000

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: sentryvision-redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.conf:/etc/redis/redis.conf:ro
      - ./logs/redis:/var/log/redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    restart: unless-stopped
    networks:
      - sentryvision-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s

  # Backend Node.js API
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: production
    container_name: sentryvision-backend
    environment:
      - NODE_ENV=production
      - PORT=9753
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-sentryvision}
      - DB_USER=${DB_USER:-sentryvision}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_ACCESS_EXPIRES_IN=15m
      - JWT_REFRESH_EXPIRES_IN=7d
      - TOTP_SECRET=${TOTP_SECRET}
      - BACKUP_CODE_ENCRYPTION_KEY=${BACKUP_CODE_ENCRYPTION_KEY}
      - AUDIT_INTEGRITY_SECRET=${AUDIT_INTEGRITY_SECRET}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3000}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      - MAX_FILE_SIZE=${MAX_FILE_SIZE:-100MB}
      - STORAGE_PATH=${STORAGE_PATH:-/app/data}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
    volumes:
      - ./logs/backend:/app/logs
      - ./data/uploads:/app/uploads
      - ./data/snapshots:/app/snapshots
      - ./data/events:/app/events
      - backend_snapshots:/app/public/snapshots
      - backend_events:/app/public/events
    ports:
      - "${BACKEND_PORT:-9753}:9753"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      opencv-service:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sentryvision-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:9753/api/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend React Application
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: sentryvision-frontend
    environment:
      - NODE_ENV=production
      - NGINX_PORT=${NGINX_PORT:-3000}
      - VITE_BACKEND_URL=${VITE_BACKEND_URL:-http://localhost:9753}
    volumes:
      - frontend_build:/usr/share/nginx/html
    ports:
      - "${FRONTEND_PORT:-3000}:${NGINX_PORT:-3000}"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sentryvision-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${NGINX_PORT:-3000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Nginx Reverse Proxy for production
  nginx:
    image: nginx:alpine
    container_name: sentryvision-nginx
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/default.conf.template:/etc/nginx/conf.d/default.conf.template:ro
      - frontend_build:/usr/share/nginx/html
    ports:
      - "${NGINX_PROXY_PORT:-80}:80"
      - "${NGINX_PROXY_SSL_PORT:-443}:443"
    environment:
      - NGINX_PORT=${NGINX_PORT:-3000}
      - BACKEND_PORT=${BACKEND_PORT:-9753}
      - DOMAIN=${DOMAIN:-localhost}
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - sentryvision-network
    profiles:
      - production
    command: >
      sh -c "envsubst '\$NGINX_PORT \$BACKEND_PORT \$DOMAIN' 
      < /etc/nginx/conf.d/default.conf.template 
      > /etc/nginx/conf.d/default.conf 
      && nginx -g 'daemon off;'"

  # OpenCV Service for AI processing
  opencv-service:
    build:
      context: ./opencv-service
      dockerfile: Dockerfile
    container_name: sentryvision-opencv
    environment:
      - NODE_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - BACKEND_HOST=backend
      - BACKEND_PORT=9753
    volumes:
      - ./data/snapshots:/app/snapshots
      - ./data/events:/app/events
      - ./models:/app/models
      - opencv_models:/app/models
    ports:
      - "${OPENCV_PORT:-9754}:9754"
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sentryvision-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:9754/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_snapshots:
    driver: local
  backend_events:
    driver: local
  frontend_build:
    driver: local
  opencv_models:
    driver: local

networks:
  sentryvision-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16