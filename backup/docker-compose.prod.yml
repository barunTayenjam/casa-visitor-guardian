version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sentryvision-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sentryvision
      POSTGRES_USER: sentryvision
      POSTGRES_PASSWORD: sentryvision123
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentryvision -d sentryvision"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sentryvision-network
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=5242kB
      -c min_wal_size=1GB
      -c max_wal_size=2GB
      -c checkpoint_timeout=15min

  redis:
    image: redis:7-alpine
    container_name: sentryvision-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redispassword123}
    volumes:
      - redis_data:/data
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redispassword123}
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sentryvision-network

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: production
    container_name: sentryvision-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - PORT=9753
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=sentryvision
      - DB_USER=sentryvision
      - DB_PASSWORD=sentryvision123
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redispassword123}
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET:-your-jwt-access-secret-here-change-in-production}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-your-jwt-refresh-secret-here-change-in-production}
      - DATABASE_URL=postgresql://sentryvision:sentryvision123@postgres:5432/sentryvision
      - CORS_ORIGIN=http://localhost:4000
      - API_URL=http://backend:9753
      - WS_URL=ws://backend:9753
    volumes:
      - ./server/cameras.json:/app/src/cameras.json
      - ./server/public:/app/public
      - ./server/data:/app/data
      - ./server/logs:/app/logs
    ports:
      - "9753:9753"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9753/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    networks:
      - sentryvision-network
    command: ["npx", "tsx", "src/index.ts"]

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: sentryvision-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      - VITE_API_BASE_URL=http://localhost:9753
      - VITE_WS_URL=ws://localhost:9753
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "4000:80"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    networks:
      - sentryvision-network

  nginx:
    image: nginx:alpine
    container_name: sentryvision-nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./public:/usr/share/nginx/html/public
      - ./data:/usr/share/nginx/html/data
    ports:
      - "80:80"
      - "443:443"
    healthcheck:
      test: ["CMD", "service", "nginx", "status"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    networks:
      - sentryvision-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  events_data:
    driver: local
  snapshots_data:
    driver: local

networks:
  sentryvision-network:
    driver: bridge