version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3010:80"
    environment:
      - VITE_API_URL=http://localhost:9753
      - VITE_WS_URL=ws://localhost:9753
    depends_on:
      - backend

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile.simple
    ports:
      - "9753:9753"
    environment:
      - NODE_ENV=production
      - PORT=9753
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=sentryvision
      - DB_USER=sentryvision
      - DB_PASSWORD=sentryvision123
      - JWT_ACCESS_SECRET=your-jwt-access-secret-here
      - JWT_REFRESH_SECRET=your-jwt-refresh-secret-here
    volumes:
      - ./server/cameras.json:/app/cameras.json
      - backend_data:/app/data
    depends_on:
      - postgres

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=sentryvision
      - POSTGRES_USER=sentryvision
      - POSTGRES_PASSWORD=sentryvision123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  postgres_data:
  backend_data: